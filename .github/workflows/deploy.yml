name: Deploy to GitHub Pages
on:
  push:
    branches: ['**']  # trigger on all branches
permissions:
  contents: write     # needs write to commit the subfolder
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Sanitise branch name
        id: branch
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          SAFE="${BRANCH//\//-}"   # replace / with -
          echo "name=$SAFE" >> $GITHUB_OUTPUT

      - run: npm run build
        env:
          VITE_BASE: /cdband-manager/${{ steps.branch.outputs.name }}/

      - name: Deploy to subfolder
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.branch.outputs.name }}
          keep_files: true   # don't wipe other branches' folders
